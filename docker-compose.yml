version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin18
      POSTGRES_PASSWORD: admin18
      POSTGRES_DB: healthtrack_db
    ports:
      - "5434:5434"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: